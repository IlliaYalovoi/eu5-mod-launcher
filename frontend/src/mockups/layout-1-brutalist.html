<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Direction 1: Brutalist Cartography (EU4 Theme)</title>
    <style>
        :root {
            /* EU4 inspired colors: Map parchment, deep oceans, wax seals */
            --bg-color: #dfd8c8;
            --text-main: #2b251e;
            --accent: #8b2516; /* Wax seal red */
            --accent-hover: #a33120;
            --border: #b8b19e;
            --ocean: #6b8a9b;

            --font-display: "Cinzel Decorative", "Times New Roman", serif; /* Ornate but sharp */
            --font-ui: "system-ui", sans-serif;
            --font-mono: "Fira Code", monospace;
        }

        body {
            margin: 0; padding: 2rem; background: var(--bg-color); color: var(--text-main);
            font-family: var(--font-ui); height: 100vh; box-sizing: border-box;
            background-image:
                linear-gradient(rgba(223, 216, 200, 0.9), rgba(223, 216, 200, 0.9)),
                url("data:image/svg+xml,%3Csvg width='100' height='100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 100 V 0 H 100' fill='none' stroke='%23b8b19e' stroke-width='1' stroke-opacity='0.2'/%3E%3C/svg%3E");
            background-size: cover, 50px 50px;
        }

        .layout {
            display: grid;
            grid-template-columns: 80px 1fr 1fr;
            grid-template-rows: 60px 1fr;
            gap: 1rem;
            height: 100%;
        }

        .header { grid-column: 1 / -1; display: flex; align-items: center; border-bottom: 2px solid var(--text-main); padding-bottom: 1rem; }
        .header h1 { font-family: var(--font-display); margin: 0; font-size: 2.5rem; letter-spacing: 0.1em; text-transform: uppercase; }
        .game-badge { margin-left: auto; padding: 0.5rem 1rem; background: var(--text-main); color: var(--bg-color); font-weight: bold; letter-spacing: 0.1em; font-family: var(--font-display); }

        .nav { grid-column: 1; border-right: 2px solid var(--text-main); display: flex; flex-direction: column; gap: 1rem; padding-right: 1rem; }
        .nav-btn { aspect-ratio: 1; border: 2px solid var(--border); background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; transition: 0.2s; }
        .nav-btn.active { border-color: var(--text-main); background: var(--text-main); color: var(--bg-color); }
        .nav-btn:hover:not(.active) { border-color: var(--text-main); }

        .panel { display: flex; flex-direction: column; gap: 1rem; min-height: 0; }
        .panel-title { font-family: var(--font-display); font-size: 1.5rem; margin: 0; border-bottom: 1px solid var(--border); padding-bottom: 0.5rem; display: flex; justify-content: space-between; }
        .panel-title span { font-family: var(--font-ui); font-size: 0.8rem; background: var(--accent); color: var(--bg-color); padding: 0.2rem 0.5rem; border-radius: 2px; }

        .list { overflow-y: auto; display: flex; flex-direction: column; gap: 0.5rem; padding-right: 0.5rem; }

        /* The Load Order List (Active Mods) */
        .load-order-item {
            display: grid; grid-template-columns: 30px 1fr auto; align-items: center;
            padding: 0.75rem; background: rgba(255,255,255,0.3); border: 1px solid var(--border);
            position: relative;
        }
        .load-order-item::before {
            content: ""; position: absolute; left: -4px; top: -4px; width: 8px; height: 8px; background: var(--accent);
            opacity: 0; transition: 0.2s;
        }
        .load-order-item:hover::before { opacity: 1; }
        .index { font-family: var(--font-mono); font-size: 0.8rem; color: var(--accent); font-weight: bold; }
        .mod-name { font-weight: 600; }
        .action-btn { background: transparent; border: 1px solid var(--text-main); cursor: pointer; padding: 0.2rem 0.5rem; font-size: 0.7rem; text-transform: uppercase; font-weight: bold; transition: 0.2s; }
        .action-btn:hover { background: var(--text-main); color: var(--bg-color); }

        /* The Disabled List (Library) */
        .disabled-item {
            display: grid; grid-template-columns: 1fr auto; align-items: center;
            padding: 0.75rem; border: 1px dashed var(--border);
            opacity: 0.8; transition: 0.2s;
        }
        .disabled-item:hover { opacity: 1; border-style: solid; border-color: var(--text-main); background: rgba(255,255,255,0.1); }

        .launch-btn {
            position: absolute; bottom: 2rem; right: 2rem;
            background: var(--accent); color: var(--bg-color);
            border: none; padding: 1.5rem 3rem; font-family: var(--font-display);
            font-size: 1.5rem; letter-spacing: 0.1em; cursor: pointer;
            box-shadow: 8px 8px 0 rgba(0,0,0,0.1); transition: 0.1s;
        }
        .launch-btn:active { transform: translate(4px, 4px); box-shadow: 4px 4px 0 rgba(0,0,0,0.1); }

        /* Auto-sort indicator */
        .auto-sort-lock {
            display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; color: var(--accent);
            padding: 0.5rem; background: rgba(139, 37, 22, 0.1); border: 1px solid var(--accent);
            margin-bottom: 0.5rem; font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="layout">
        <header class="header">
            <h1>Imperator</h1>
            <div class="game-badge">EUROPA UNIVERSALIS IV</div>
        </header>

        <nav class="nav">
            <button class="nav-btn active">EU4</button>
            <button class="nav-btn">HOI4</button>
            <button class="nav-btn">CK3</button>
            <button class="nav-btn" style="margin-top: auto;">SET</button>
        </nav>

        <!-- Active Mods / Load Order -->
        <main class="panel">
            <h2 class="panel-title">Active Deployment <span>Load Order</span></h2>
            <div class="auto-sort-lock">
                🔒 System is auto-optimizing load order based on dependencies.
            </div>
            <div class="list">
                <div class="load-order-item">
                    <span class="index">01</span>
                    <span class="mod-name">Graphical Map Improvements</span>
                    <button class="action-btn">Disable</button>
                </div>
                <div class="load-order-item">
                    <span class="index">02</span>
                    <span class="mod-name">Imperium Universalis</span>
                    <button class="action-btn">Disable</button>
                </div>
                <div class="load-order-item">
                    <span class="index">03</span>
                    <span class="mod-name">UI Overhaul</span>
                    <button class="action-btn">Disable</button>
                </div>
            </div>
        </main>

        <!-- Disabled Mods / Library -->
        <aside class="panel">
            <h2 class="panel-title" style="color: var(--border);">Reserve Library <span>Disabled</span></h2>
            <input type="text" placeholder="Search reserves..." style="padding: 0.5rem; border: 1px solid var(--border); background: transparent; font-family: inherit;">
            <div class="list">
                <div class="disabled-item">
                    <span class="mod-name">Expanded Missions</span>
                    <button class="action-btn" style="color: var(--accent); border-color: var(--accent);">Enable</button>
                </div>
                <div class="disabled-item">
                    <span class="mod-name">Missions Expanded</span>
                    <button class="action-btn" style="color: var(--accent); border-color: var(--accent);">Enable</button>
                </div>
                <div class="disabled-item">
                    <span class="mod-name">Flavor Universalis</span>
                    <button class="action-btn" style="color: var(--accent); border-color: var(--accent);">Enable</button>
                </div>
            </div>
        </aside>
    </div>

    <button class="launch-btn">PLAY</button>
</body>
</html>
